<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrapeHub · Gestão de Garrafeira Premium</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a0a0e">
  <meta name="description" content="Catálogo digital premium para gestão da sua garrafeira pessoal">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GrapeHub">

  <!-- Favicon SVG — wine glass -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%231a0a0e' width='32' height='32' rx='6'/><text x='16' y='22' font-size='18' text-anchor='middle'>🍷</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%231a0a0e' width='180' height='180' rx='40'/><text x='90' y='118' font-size='90' text-anchor='middle'>🍷</text></svg>">

  <!-- Fonts — Playfair Display (editorial) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="src/assets/styles.css">
</head>
<body>
  <div id="app"></div>

  <!-- Vue 3 + Vue Router (local UMD builds — works offline) -->
  <script src="src/assets/vue.global.prod.js"></script>
  <script src="src/assets/vue-router.global.prod.js"></script>
  <script src="src/assets/chart.umd.min.js"></script>

  <script type="module" src="src/main.js"></script>

  <script>
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(() => console.log('🍷 GrapeHub SW registado'))
          .catch(e => console.warn('SW:', e));
      });
    }
    // PWA install prompt
    let _pwaPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); _pwaPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-installable'));
    });
    window.installPWA = async () => {
      if (_pwaPrompt) { _pwaPrompt.prompt(); _pwaPrompt = null; }
    };
  </script>
</body>
</html>
